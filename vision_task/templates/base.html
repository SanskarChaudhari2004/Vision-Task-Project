<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Vision Task{% endblock %}</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    />
    <style>
        .sensitivity-low { background-color: #d4edda; }
        .sensitivity-medium { background-color: #fff3cd; }
        .sensitivity-high { background-color: #f8d7da; }
        .navbar-brand { font-weight: bold; }
        .badge-admin { background-color: #dc3545; }
        .badge-manager { background-color: #0d6efd; }
        .badge-user { background-color: #6c757d; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Vision Task</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                {% if user %}
                <li class="nav-item">
                    <span class="navbar-text me-3">{{ user.username }} ({{ user.department }})</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('login_page') }}">Login</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
<main class="container mt-4">
    {% block content %}{% endblock %}
</main>
<footer class="text-center text-muted py-4 mt-5">
    <small>Vision Task - Healthcare Task Management System | Activity logs maintained for compliance</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
