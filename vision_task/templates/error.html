{% extends "base.html" %}
{% block title %}Error — VisionTask{% endblock %}
{% block content %}
<div style="max-width:480px;margin:80px auto;text-align:center;">
    <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
    <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:8px;">Access Denied</h2>
    <p style="color:var(--muted);margin-bottom:28px;">{{ message }}</p>
    <div style="display:flex;gap:12px;justify-content:center;">
        <a href="{{ url_for('ui_dashboard') }}" class="btn-brand">Return to Dashboard</a>
        <a href="{{ url_for('index') }}" class="btn-outline">Go Home</a>
    </div>
</div>
{% endblock %}
